<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Astra AI — Sky Pinnacle · AI Automation Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#FAF7F2;--gold:#C9A96E;--gold2:#E8C87A;--dark:#050508;
  --charcoal:#0e0e14;--panel:#13131a;--mid:#3A3A3A;--muted:#8A8A8A;
  --blue:#00C2FF;--green:#00E87A;--purple:#9B6DFF;--amber:#FFB800;
  --glass:rgba(255,255,255,0.04);--glassBorder:rgba(255,255,255,0.07);
  --shadow-blue:0 0 40px rgba(0,194,255,0.12),0 0 80px rgba(0,194,255,0.05);
  --shadow-green:0 0 40px rgba(0,232,122,0.12),0 0 80px rgba(0,232,122,0.05);
  --glow-blue:0 0 20px rgba(0,194,255,0.5),0 0 60px rgba(0,194,255,0.18);
  --glow-green:0 0 20px rgba(0,232,122,0.5),0 0 60px rgba(0,232,122,0.18);
  --card-s:0 4px 24px rgba(0,0,0,0.45),0 1px 0 rgba(255,255,255,0.04) inset;
  --card-sh:0 16px 56px rgba(0,0,0,0.65),0 1px 0 rgba(255,255,255,0.07) inset;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--cream);font-family:'DM Sans',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--blue),var(--green));border-radius:2px}
img{max-width:100%;display:block}

/* NOISE */
body::before{content:'';position:fixed;inset:0;opacity:.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:9998}

/* ── TAB BAR ── */
#tab-bar{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(5,5,8,0.82);backdrop-filter:blur(40px) saturate(160%);border-bottom:1px solid rgba(255,255,255,0.05);height:66px;box-shadow:0 1px 0 rgba(255,255,255,0.03),0 4px 32px rgba(0,0,0,0.5)}
.tab-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--cream);letter-spacing:.04em;display:flex;align-items:center;gap:10px}
.tab-logo span{color:var(--gold)}
.tab-logo-dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--green));box-shadow:0 0 12px rgba(0,194,255,.7),0 0 24px rgba(0,232,122,.4);animation:glowDot 2s infinite}
.tab-btns{display:flex;gap:4px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:4px;backdrop-filter:blur(20px)}
.tab-btn{padding:8px 24px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;transition:all .3s;color:rgba(250,247,242,.4);background:transparent;letter-spacing:.01em}
.tab-btn.active{background:linear-gradient(135deg,var(--gold),#A8832A);color:var(--dark);font-weight:600;box-shadow:0 4px 16px rgba(201,169,110,.3)}
.tab-btn:not(.active):hover{color:var(--cream);background:rgba(255,255,255,.05)}
.tab-nav-links{display:flex;gap:28px}
.tab-nav-links a{font-size:11px;color:rgba(250,247,242,.38);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;transition:color .2s;position:relative}
.tab-nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--gold);transition:width .3s}
.tab-nav-links a:hover{color:var(--gold)}
.tab-nav-links a:hover::after{width:100%}

/* ── PAGES ── */
.page{display:none;padding-top:66px;min-height:100vh}
.page.active{display:block}

/* ══════════════════════════════════════
   PAGE 1 — PROPERTY (preserved)
══════════════════════════════════════ */
.hero-wrap{position:relative;height:100vh;overflow:hidden}
.hero-img{width:100%;height:100%;object-fit:cover;filter:brightness(.5) saturate(1.1)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,5,8,.1) 0%,rgba(5,5,8,.3) 40%,rgba(5,5,8,.92) 100%)}
.hero-overlay-side{position:absolute;inset:0;background:linear-gradient(90deg,rgba(5,5,8,.55) 0%,transparent 60%)}
.hero-content{position:absolute;bottom:80px;left:80px;right:80px}
.hero-tag{display:inline-flex;align-items:center;gap:9px;background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.3);border-radius:30px;padding:7px 20px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:28px;backdrop-filter:blur(12px)}
.hero-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(56px,7.5vw,104px);font-weight:300;line-height:.95;color:var(--cream);margin-bottom:8px;letter-spacing:-.02em}
.hero-title em{font-style:italic;color:var(--gold2)}
.hero-sub{font-size:13px;color:rgba(250,247,242,.5);letter-spacing:.22em;text-transform:uppercase;margin-bottom:44px}
.hero-stats{display:flex;gap:52px}
.hero-stat{border-left:1px solid rgba(201,169,110,.2);padding-left:20px}
.hero-stat-val{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:500;color:var(--cream);line-height:1}
.hero-stat-lbl{font-size:10px;color:rgba(250,247,242,.4);letter-spacing:.12em;text-transform:uppercase;margin-top:5px}
.hero-cta{display:flex;gap:16px;margin-top:44px}
.btn-gold{display:inline-flex;align-items:center;gap:8px;padding:14px 34px;background:linear-gradient(135deg,var(--gold),#A8832A);color:var(--dark);font-family:'DM Sans',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:5px;cursor:pointer;transition:all .35s;text-decoration:none;box-shadow:0 4px 20px rgba(201,169,110,.25)}
.btn-gold:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 40px rgba(201,169,110,.45)}
.btn-outline{display:inline-flex;align-items:center;gap:8px;padding:14px 34px;background:rgba(255,255,255,.04);backdrop-filter:blur(12px);color:var(--cream);font-family:'DM Sans',sans-serif;font-weight:500;font-size:12px;letter-spacing:.08em;text-transform:uppercase;border:1px solid rgba(250,247,242,.18);border-radius:5px;cursor:pointer;transition:all .35s;text-decoration:none}
.btn-outline:hover{border-color:rgba(201,169,110,.5);color:var(--gold);transform:translateY(-3px)}
.hero-scroll{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(250,247,242,.3);font-size:9px;letter-spacing:.18em;text-transform:uppercase}
.scroll-line{width:1px;height:52px;background:linear-gradient(180deg,transparent,var(--gold));animation:scrollPulse 2s ease infinite}
.section{padding:110px 80px}
.section-tag{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.section-tag::before{content:'';width:24px;height:1px;background:var(--gold);flex-shrink:0}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,4.2vw,62px);font-weight:300;line-height:1.05;color:var(--cream);margin-bottom:30px}
.section-title em{font-style:italic;color:var(--gold2)}
.divider{width:64px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin-bottom:36px}
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:88px;align-items:start}
.overview-text{font-size:15px;color:rgba(250,247,242,.58);line-height:2;margin-bottom:28px}
.overview-img-wrap{position:relative}
.overview-img-wrap img{width:100%;height:600px;object-fit:cover;border-radius:2px;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.img-caption{position:absolute;bottom:-1px;left:0;right:0;background:linear-gradient(180deg,transparent,rgba(5,5,8,.95));padding:48px 24px 22px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(250,247,242,.4)}
.detail-pills{display:flex;flex-wrap:wrap;gap:12px;margin-top:36px}
.detail-pill{background:linear-gradient(135deg,rgba(201,169,110,.07),rgba(201,169,110,.02));border:1px solid rgba(201,169,110,.2);border-radius:4px;padding:16px 22px;transition:all .3s;backdrop-filter:blur(12px)}
.detail-pill:hover{background:linear-gradient(135deg,rgba(201,169,110,.12),rgba(201,169,110,.04));border-color:rgba(201,169,110,.35);transform:translateY(-2px)}
.pill-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;opacity:.8}
.pill-val{font-size:13px;font-weight:500;color:var(--cream)}
.gallery-section{padding:88px 80px;background:var(--charcoal);position:relative}
.gallery-section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.2),transparent)}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:52px}
.gallery-item{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:4/3}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .7s}
.gallery-item:hover img{transform:scale(1.08)}
.gallery-item .g-overlay{position:absolute;inset:0;background:rgba(5,5,8,0);transition:background .4s}
.gallery-item:hover .g-overlay{background:rgba(5,5,8,.4)}
.gallery-item .g-label{position:absolute;bottom:0;left:0;right:0;padding:22px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(250,247,242,.9);transform:translateY(100%);transition:transform .4s;background:linear-gradient(180deg,transparent,rgba(5,5,8,.7))}
.gallery-item:hover .g-label{transform:translateY(0)}
.gallery-item.tall{grid-row:span 2;aspect-ratio:auto}
.gallery-item.tall img{height:100%}
.gallery-item.vr-item .vr-badge{position:absolute;top:14px;right:14px;background:rgba(0,194,255,.85);backdrop-filter:blur(8px);color:var(--dark);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:20px;z-index:5;box-shadow:0 0 16px rgba(0,194,255,.5)}
.gallery-item.vr-item .vr-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;opacity:0;transition:opacity .35s}
.gallery-item.vr-item:hover .vr-play{opacity:1}
.vr-play-btn{width:72px;height:72px;border-radius:50%;background:rgba(0,194,255,.9);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 32px rgba(0,194,255,.6)}
.amenities-section{padding:110px 80px}
.amenity-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;margin-top:52px}
.amenity-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);padding:30px 16px;text-align:center;transition:all .35s;cursor:default;position:relative;overflow:hidden}
.amenity-item::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);transform:scaleX(0);transition:transform .4s}
.amenity-item:hover{background:rgba(201,169,110,.05);border-color:rgba(201,169,110,.2);transform:translateY(-3px)}
.amenity-item:hover::before{transform:scaleX(1)}
.amenity-icon{font-size:27px;margin-bottom:13px;display:block;transition:transform .3s}
.amenity-item:hover .amenity-icon{transform:translateY(-3px) scale(1.1)}
.amenity-name{font-size:10px;letter-spacing:.06em;color:rgba(250,247,242,.5);line-height:1.5}
.location-section{display:grid;grid-template-columns:1fr 1fr;min-height:540px}
.location-map{background:linear-gradient(135deg,#070d1a,#001020,#050508);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.map-grid{position:absolute;inset:0;opacity:.07;background-image:linear-gradient(rgba(0,194,255,1) 1px,transparent 1px),linear-gradient(90deg,rgba(0,194,255,1) 1px,transparent 1px);background-size:55px 55px}
.map-pin{width:64px;height:64px;border-radius:50%;background:rgba(201,169,110,.12);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:26px;animation:ping 2.5s infinite;box-shadow:0 0 32px rgba(201,169,110,.3)}
.map-rings{position:absolute}
.map-ring{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(201,169,110,.15);transform:translate(-50%,-50%);animation:ripple 3.5s infinite}
.map-ring:nth-child(1){width:110px;height:110px;animation-delay:0s}
.map-ring:nth-child(2){width:200px;height:200px;animation-delay:.9s}
.map-ring:nth-child(3){width:290px;height:290px;animation-delay:1.8s}
.location-info{background:var(--charcoal);padding:88px 64px;position:relative}
.location-points{margin-top:36px}
.loc-point{display:flex;align-items:start;gap:18px;padding:18px 0;border-bottom:1px solid rgba(255,255,255,.05);transition:padding-left .3s}
.loc-point:hover{padding-left:6px}
.loc-point:last-child{border-bottom:none}
.loc-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);margin-top:5px;flex-shrink:0}
.loc-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;opacity:.8}
.loc-val{font-size:13px;color:rgba(250,247,242,.65)}
.rera-strip{background:rgba(201,169,110,.04);border-top:1px solid rgba(201,169,110,.1);border-bottom:1px solid rgba(201,169,110,.1);padding:26px 80px;display:flex;align-items:center;gap:24px}
.rera-badge{background:rgba(201,169,110,.08);border:1px solid rgba(201,169,110,.25);border-radius:4px;padding:8px 18px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);flex-shrink:0}
.rera-text{font-size:11px;color:rgba(250,247,242,.4)}
.cta-section{padding:130px 80px;text-align:center;background:linear-gradient(180deg,var(--dark),var(--charcoal));position:relative;overflow:hidden}
.cta-section::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,194,255,.04),transparent 70%);pointer-events:none}
.cta-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,76px);font-weight:300;color:var(--cream);margin-bottom:18px}
.cta-title em{font-style:italic;color:var(--gold2)}
.footer{background:var(--charcoal);padding:80px 80px 36px;border-top:1px solid rgba(255,255,255,.05)}
.footer-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:60px;margin-bottom:64px}
.footer-brand{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--cream);margin-bottom:18px}
.footer-desc{font-size:13px;color:rgba(250,247,242,.38);line-height:1.9}
.footer-heading{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;opacity:.8}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:11px}
.footer-links a{font-size:12px;color:rgba(250,247,242,.38);text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--gold)}
.footer-bottom{border-top:1px solid rgba(255,255,255,.05);padding-top:30px;display:flex;justify-content:space-between;align-items:center}
.footer-copy{font-size:10px;color:rgba(250,247,242,.25);letter-spacing:.06em}

/* ══════════════════════════════════════
   PAGE 2 — AUTOMATION PLATFORM (full rebuild)
══════════════════════════════════════ */

/* ── P2 shared ── */
.p2-section-tag{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.p2-section-tag::before{content:'';width:24px;height:1px;background:var(--blue);flex-shrink:0}
.p2-section-title{font-family:'Syne',sans-serif;font-size:clamp(30px,3.6vw,52px);font-weight:700;color:var(--cream);margin-bottom:14px;letter-spacing:-.01em}
.p2-section-sub{font-size:15px;color:rgba(250,247,242,.44);max-width:600px;line-height:1.8}
.p2-section{padding:100px 80px}
.p2-section.dark-bg{background:var(--dark)}
.p2-section.panel-bg{background:var(--panel)}
.p2-section.charcoal-bg{background:var(--charcoal)}

/* ── HERO ── */
.p2-hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;background:var(--dark)}
.p2-hero-bg{position:absolute;inset:0}
.p2-hero-bg-img{width:100%;height:100%;object-fit:cover;opacity:.1;filter:brightness(.35) saturate(.8)}
.p2-grid-overlay{position:absolute;inset:0;opacity:.04;background-image:linear-gradient(rgba(0,194,255,.8) 1px,transparent 1px),linear-gradient(90deg,rgba(0,194,255,.8) 1px,transparent 1px);background-size:80px 80px}
.p2-orb{position:absolute;border-radius:50%;filter:blur(130px);pointer-events:none}
.p2-hero-content{position:relative;z-index:2;padding:120px 80px;max-width:960px}
.p2-eyebrow{display:inline-flex;align-items:center;gap:10px;background:rgba(0,194,255,.07);border:1px solid rgba(0,194,255,.18);border-radius:30px;padding:7px 22px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:30px;backdrop-filter:blur(12px)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;box-shadow:0 0 8px var(--green)}
.p2-hero-title{font-family:'Syne',sans-serif;font-size:clamp(44px,6.5vw,86px);font-weight:800;line-height:1.03;color:var(--cream);margin-bottom:26px;letter-spacing:-.02em}
.p2-hero-title .ac-blue{color:var(--blue);text-shadow:var(--glow-blue)}
.p2-hero-title .ac-green{color:var(--green);text-shadow:var(--glow-green)}
.p2-hero-desc{font-size:16px;color:rgba(250,247,242,.5);line-height:1.85;max-width:580px;margin-bottom:48px}
.p2-kpi-row{display:flex;gap:0;margin-bottom:48px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;backdrop-filter:blur(20px)}
.p2-kpi{padding:24px 36px;border-right:1px solid rgba(255,255,255,.06);flex:1}
.p2-kpi:last-child{border-right:none}
.p2-kpi-val{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1;margin-bottom:5px}
.p2-kpi-lbl{font-size:10px;color:rgba(250,247,242,.35);letter-spacing:.08em;text-transform:uppercase}
.p2-hero-btns{display:flex;gap:14px}
.btn-blue{display:inline-flex;align-items:center;gap:8px;padding:14px 34px;background:linear-gradient(135deg,var(--blue),#0070EE);color:var(--dark);font-family:'DM Sans',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;border:none;border-radius:6px;cursor:pointer;transition:all .35s;text-decoration:none;box-shadow:0 4px 20px rgba(0,194,255,.3)}
.btn-blue:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 40px rgba(0,194,255,.5)}
.btn-green{display:inline-flex;align-items:center;gap:8px;padding:14px 34px;background:linear-gradient(135deg,var(--green),#00A855);color:var(--dark);font-family:'DM Sans',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;border:none;border-radius:6px;cursor:pointer;transition:all .35s;text-decoration:none;box-shadow:0 4px 20px rgba(0,232,122,.3)}
.btn-green:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 40px rgba(0,232,122,.5)}

/* ── SERVICES DEEP-DIVE ── */
.services-deep-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:60px}
.svc-deep-card{
  background:var(--charcoal);border:1px solid rgba(255,255,255,.05);
  padding:44px 40px;transition:all .4s;position:relative;overflow:hidden;cursor:default;
}
.svc-deep-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;transform:scaleX(0);transform-origin:left;transition:transform .5s}
.svc-deep-card::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .4s;background:radial-gradient(ellipse at 50% -10%,rgba(0,194,255,.05),transparent 60%)}
.svc-deep-card:hover{transform:translateY(-5px);border-color:rgba(0,194,255,.15);box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 40px rgba(0,194,255,.05)}
.svc-deep-card:hover::before{transform:scaleX(1)}
.svc-deep-card:hover::after{opacity:1}
.svc-deep-card.c-blue::before{background:linear-gradient(90deg,var(--blue),var(--green))}
.sv
